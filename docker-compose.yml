services:
    www:
        build: .
        ports: 
            - "8001:80"
        volumes:
            - ./www:/var/www/html/
        depends_on:
            - postgres

    postgres:
        image: postgres:latest
        environment:
            POSTGRES_USER: postgres_user
            POSTGRES_PASSWORD: postgres_password
            POSTGRES_DB: postgres_db
        ports:
            - "5432:5432"
        volumes:
            - ./dump:/docker-entrypoint-initdb.d
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
